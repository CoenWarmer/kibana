summary: Get a wired stream
value:
  stream:
    name: logs.nginx
    description: Web server access logs, routed by severity
    type: wired
    updated_at: '2025-01-15T10:30:00.000Z'
    ingest:
      lifecycle:
        inherit: {}
      processing:
        steps: []
        updated_at: '2025-01-15T10:30:00.000Z'
      settings: {}
      failure_store:
        inherit: {}
      wired:
        fields:
          host.name:
            type: keyword
          http.response.status_code:
            type: long
          message:
            type: match_only_text
        routing:
          - destination: logs.nginx.errors
            where:
              field: http.response.status_code
              gte: 500
            status: enabled
  dashboards: []
  rules: []
  queries: []
  data_stream_exists: true
  inherited_fields:
    '@timestamp':
      type: date
      from: logs
    log.level:
      type: keyword
      from: logs
  effective_lifecycle:
    dsl:
      data_retention: 7d
    from: logs
  effective_settings: {}
  effective_failure_store:
    disabled: {}
    from: logs
  privileges:
    manage: true
    monitor: true
    view_index_metadata: true
    lifecycle: true
    simulate: true
    text_structure: true
    read_failure_store: true
    manage_failure_store: true
    create_snapshot_repository: false
