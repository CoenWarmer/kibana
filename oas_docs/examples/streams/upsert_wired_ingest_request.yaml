summary: Update a wired stream ingest configuration with grok processing
value:
  ingest:
    lifecycle:
      inherit: {}
    processing:
      steps:
        - action: grok
          from: message
          patterns:
            - >-
              %{IPORHOST:client.ip} %{USER:ident} %{USER:auth} \[%{HTTPDATE:@timestamp}\] "%{WORD:http.method}
              %{DATA:url.original} HTTP/%{NUMBER:http.version}" %{NUMBER:http.response.status_code:int}
              (?:%{NUMBER:http.response.body.bytes:int}|-)
          ignore_missing: false
    settings: {}
    failure_store:
      inherit: {}
    wired:
      fields:
        client.ip:
          type: ip
        http.method:
          type: keyword
        http.response.status_code:
          type: long
        http.response.body.bytes:
          type: long
        url.original:
          type: wildcard
      routing:
        - destination: logs.nginx.errors
          where:
            field: http.response.status_code
            eq: '500'
          status: enabled
